baseURL = "https://jcmk77.github.io/"
languageCode = "en-us"
title = "Jason Chen | AI Robotics & Computer Engineering"
theme = "hugo-profile"
summaryLength = 24
enableEmoji = true
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "RSS"]

[pagination]
  pagerSize = 6

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[related]
  includeNewer = true
  threshold = 80
  toLower = true

[[related.indices]]
  name = "keywords"
  weight = 100

[[related.indices]]
  name = "tags"
  weight = 80

[[menu.main]]
  identifier = "home"
  name = "Home"
  title = "Home"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "projects"
  name = "Projects"
  title = "Projects"
  url = "/projects/"
  weight = 20

[[menu.main]]
  identifier = "blog"
  name = "Blog"
  title = "Technical Blog"
  url = "/post/"
  weight = 30

[[menu.main]]
  identifier = "about"
  name = "About"
  title = "About"
  url = "/about/"
  weight = 40

[[menu.main]]
  identifier = "resume"
  name = "Resume"
  title = "Resume"
  url = "/resume/"
  weight = 50

[[menu.main]]
  identifier = "contact"
  name = "Contact"
  title = "Contact"
  url = "/contact/"
  weight = 60

[params]
  title = "Jason Chen"
  description = "Portfolio and technical blog of Jason Chen, a Computer Engineering student at Simon Fraser University focused on AI robotics, embedded systems, edge AI, and hardware acceleration."
  hostName = "https://jcmk77.github.io"
  favicon = "/favicons/favicon.ico"
  images = ["/images/site-feature-image.png"]
  useBootstrapCDN = false
  mathjax = false
  animate = true
  customCSS = true
  mainSections = ["post"]

  [params.theme]
    defaultTheme = "light"

  [params.font]
    fontSize = "1rem"
    fontWeight = 400
    lineHeight = 1.6
    textAlign = "left"

  [params.color]
    textColor = "#24292f"
    secondaryTextColor = "#57606a"
    textLinkColor = "#0969da"
    backgroundColor = "#f6f8fa"
    secondaryBackgroundColor = "#ffffff"
    primaryColor = "#0969da"
    secondaryColor = "#ffffff"

    [params.color.darkmode]
      textColor = "#f0f3f6"
      secondaryTextColor = "#b7c0cc"
      textLinkColor = "#8cc2ff"
      backgroundColor = "#0d1117"
      secondaryBackgroundColor = "#161b22"
      primaryColor = "#8cc2ff"
      secondaryColor = "#161b22"

  [params.navbar]
    align = "ms-auto"
    brandName = "Jason Chen"
    showBrandLogo = false
    disableSearch = true
    enableSeparator = false

    [params.navbar.stickyNavBar]
      enable = true
      showOnScrollUp = true

    [params.navbar.menus]
      disableAbout = true
      disableExperience = true
      disableEducation = true
      disableProjects = true
      disableAchievements = true
      disableContact = true

  [params.hero]
    enable = true
    intro = "Hi, I am"
    name = "Jason (Mukun) Chen"
    subtitle = "Computer Engineering Student @ Simon Fraser University"
    description = "I build projects across Embodied AI, LLM, AI agent systems, and computing acceleration."
    image = "/images/profile-cat.jpg"

  [params.about]
    enable = false

  [params.experience]
    enable = false

  [params.education]
    enable = false

  [params.projects]
    enable = false

  [params.achievements]
    enable = false

  [params.contact]
    enable = false

  [params.footer]
    [params.footer.recentPosts]
      path = "post"
      count = 3
      title = "Recent Technical Writing"
      enable = true
      disableFeaturedImage = true

    [params.footer.socialNetworks]
      github = "https://github.com/jcmk77"
      linkedin = "https://www.linkedin.com/in/jcmk26"

  [params.listPages]
    disableFeaturedImage = true

  [params.singlePages]
    socialShare = false

    [params.singlePages.readTime]
      enable = true
      content = "min read"

    [params.singlePages.scrollprogress]
      enable = true

    [params.singlePages.tags]
      openInNewTab = false

  [params.terms]
    read = "Read"
    toc = "Table of Contents"
    tags = "Tags"
    social = "Share"
    copyright = "All rights reserved"
    emailText = "Read this post:"

  [params.datesFormat]
    article = "Jan 2, 2006"
    articleList = "Jan 2, 2006"
    articleRecent = "Jan 2, 2006"
